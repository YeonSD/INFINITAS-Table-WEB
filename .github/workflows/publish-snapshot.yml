name: Publish Snapshot

on:
  workflow_dispatch:
    inputs:
      triggered_by_email:
        description: Triggered by admin email
        required: false
        type: string
      triggered_by_user_id:
        description: Triggered by admin user id
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: publish-snapshot
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Debug Supabase source
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "SUPABASE_URL=$SUPABASE_URL"
          node - <<'EOF'
          const url = new URL(`${process.env.SUPABASE_URL}/rest/v1/chart_metadata`);
          url.searchParams.set('select', 'table_key,song_title,chart_type,category,source_sort_index,classification_status,updated_at');
          url.searchParams.set('table_key', 'eq.SP11H');
          url.searchParams.set('chart_type', 'eq.A');
          url.searchParams.set('song_title', 'eq.MA・TSU・RI');
          fetch(url, {
            headers: {
              apikey: process.env.SUPABASE_SERVICE_ROLE_KEY,
              Authorization: `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`
            }
          })
            .then(async (response) => {
              const text = await response.text();
              console.log('DB_STATUS=' + response.status);
              console.log('DB_BODY=' + text);
              if (!response.ok) process.exit(1);
            })
            .catch((error) => {
              console.error(error);
              process.exit(1);
            });
          EOF

      - name: Build snapshot from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node ./scripts/build-app-snapshot.mjs --source supabase

      - name: Debug generated snapshot
        run: |
          node - <<'EOF'
          const fs = require('node:fs');
          const snapshot = JSON.parse(fs.readFileSync('./assets/data/app-snapshot.json', 'utf8'));
          const table = snapshot.rankTables?.SP11H;
          const hits = [];
          for (const category of table?.categories || []) {
            for (const item of category.items || []) {
              const data = item?.data || {};
              if (String(data.title || '').normalize('NFKC') === 'MA・TSU・RI'.normalize('NFKC') && String(data.type || '') === 'A') {
                hits.push({
                  category: category.category,
                  sortindex: category.sortindex,
                  title: data.title,
                  type: data.type
                });
              }
            }
          }
          console.log('SNAPSHOT_VERSION=' + String(snapshot.version || ''));
          console.log('SNAPSHOT_PUBLISHED_AT=' + String(snapshot.publishedAt || ''));
          console.log('SNAPSHOT_MA_TSU_RI=' + JSON.stringify(hits));
          EOF

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/app-snapshot.json assets/data/snapshot-version.json
          git diff --cached --quiet && exit 0
          git commit -m "Publish snapshot from admin request"
          git push origin main
